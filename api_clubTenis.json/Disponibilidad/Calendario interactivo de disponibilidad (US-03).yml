info:
  name: Calendario interactivo de disponibilidad (US-03)
  type: http
  seq: 1
  tags:
    - Disponibilidad

http:
  method: GET
  url: "{{baseUrl}}/disponibilidad"
  params:
    - name: fechaInicio
      value: ""
      type: query
      description: Fecha inicial del rango consultado.
    - name: fechaFin
      value: ""
      type: query
      description: Fecha final del rango consultado.
    - name: idPista
      value: "1"
      type: query
      description: Filtra la disponibilidad para una pista concreta.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Disponibilidad obtenida correctamente.
    request:
      url: "{{baseUrl}}/disponibilidad"
      method: GET
      params:
        - name: fechaInicio
          value: ""
          type: query
          description: Fecha inicial del rango consultado.
        - name: fechaFin
          value: ""
          type: query
          description: Fecha final del rango consultado.
        - name: idPista
          value: "1"
          type: query
          description: Filtra la disponibilidad para una pista concreta.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "fechaInicio": "2026-04-10",
            "fechaFin": "2026-04-16",
            "generatedAt": "2026-04-06T12:45:00Z",
            "pistas": [
              {
                "idPista": 2,
                "nombrePista": "Pista Central",
                "estadoPista": "Disponible",
                "franjas": [
                  {
                    "fecha": "2026-04-10",
                    "horaInicio": "18:00",
                    "horaFin": "18:00",
                    "estado": "Disponible"
                  }
                ]
              }
            ]
          }
  - name: 400 Response
    description: Bad Request - Rango de fechas inválido.
    request:
      url: "{{baseUrl}}/disponibilidad"
      method: GET
      params:
        - name: fechaInicio
          value: ""
          type: query
          description: Fecha inicial del rango consultado.
        - name: fechaFin
          value: ""
          type: query
          description: Fecha final del rango consultado.
        - name: idPista
          value: "1"
          type: query
          description: Filtra la disponibilidad para una pista concreta.
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/disponibilidad"
      method: GET
      params:
        - name: fechaInicio
          value: ""
          type: query
          description: Fecha inicial del rango consultado.
        - name: fechaFin
          value: ""
          type: query
          description: Fecha final del rango consultado.
        - name: idPista
          value: "1"
          type: query
          description: Filtra la disponibilidad para una pista concreta.
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

docs: |
  Devuelve las franjas horarias libres y ocupadas por pista para un rango de fechas. Permite navegación diaria o semanal mediante fechaInicio y fechaFin. El servidor debe optimizar la consulta para devolver solo la disponibilidad del rango solicitado.
