info:
  name: Error 409 - Email Duplicado
  type: http
  seq: 3
  tags:
    - Autenticación

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "edu@edu.com",
        "nombre": "Eduardo",
        "password": "12345",
        "telefono": "+34600112233"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:4010
  scripts:
    - type: tests
      code: |-
        test("El código de estado debe ser 409 (Conflicto)", function() {
          expect(res.getStatus()).to.equal(409);
        });

        test("Verificar BUG-003: No debe hablar de pistas", function() {
          const data = res.getBody();
          expect(data.message).to.not.include("pista seleccionada");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Crea un nuevo usuario con rol Socio. El rol no puede ser enviado por el cliente para evitar elevación de privilegios.
