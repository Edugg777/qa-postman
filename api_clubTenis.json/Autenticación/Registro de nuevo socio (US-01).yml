info:
  name: Registro de nuevo socio (US-01)
  type: http
  seq: 1
  tags:
    - Autenticación

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "edu@edu.com",
        "nombre": "Eduardo",
        "password": "12345",
        "telefono": "600112233"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:4010
  scripts:
    - type: tests
      code: |-
        test("El código de estado debe ser 201 (Creado)", function() {
          expect(res.getStatus()).to.equal(201);
        });

        test("Debe devolver el mensaje de éxito correcto", function() {
          const data = res.getBody();
          expect(data.message).to.equal("Usuario creado correctamente");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Crea un nuevo usuario con rol Socio. El rol no puede ser enviado por el cliente para evitar elevación de privilegios.
