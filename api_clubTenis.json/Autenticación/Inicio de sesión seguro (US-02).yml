info:
  name: Inicio de sesión seguro (US-02)
  type: http
  seq: 2
  tags:
    - Autenticación

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  Valida credenciales y devuelve un token JWT válido. El cliente, tras recibir 200, debe redirigir a la vista de "Mis Reservas". Si las credenciales no son correctas, el servidor devolverá un error genérico sin indicar si el fallo es del email o de la contraseña.
