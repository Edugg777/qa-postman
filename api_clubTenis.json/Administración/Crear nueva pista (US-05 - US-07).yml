info:
  name: Crear nueva pista (US-05 / US-07)
  type: http
  seq: 1
  tags:
    - Administración

http:
  method: POST
  url: "{{baseUrl}}/pistas"
  body:
    type: json
    data: |-
      {
        "nombre": "Pista Central",
        "superficie": "TierraBatida",
        "estado": "Disponible"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Created - Pista añadida correctamente.
    request:
      url: "{{baseUrl}}/pistas"
      method: POST
      body:
        type: json
        data: |-
          {
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible",
            "createdAt": "2026-04-06T09:00:00Z",
            "updatedAt": "2026-04-06T09:30:00Z"
          }
  - name: 400 Response
    description: Bad Request - Datos de pista inválidos.
    request:
      url: "{{baseUrl}}/pistas"
      method: POST
      body:
        type: json
        data: |-
          {
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/pistas"
      method: POST
      body:
        type: json
        data: |-
          {
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 403 Response
    description: Forbidden - Se requiere rol Administrador.
    request:
      url: "{{baseUrl}}/pistas"
      method: POST
      body:
        type: json
        data: |-
          {
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible"
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 409 Response
    description: Conflict - Ya existe una pista con ese nombre.
    request:
      url: "{{baseUrl}}/pistas"
      method: POST
      body:
        type: json
        data: |-
          {
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

docs: |
  Solo un usuario con rol Administrador puede crear pistas.
