info:
  name: Eliminar pista (US-05 / US-07)
  type: http
  seq: 3
  tags:
    - Administración

http:
  method: DELETE
  url: "{{baseUrl}}/pistas/:id"
  params:
    - name: id
      value: "1"
      type: path
      description: Identificador de la pista.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: No Content - Pista eliminada correctamente.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 403 Response
    description: Forbidden - Se requiere rol Administrador.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 404 Response
    description: Not Found - Pista no encontrada.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 409 Response
    description: Conflict - La pista no puede eliminarse porque tiene reservas futuras activas.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

docs: |
  Solo un usuario con rol Administrador puede eliminar pistas. El backend puede rechazar la eliminación si existen reservas futuras asociadas.
