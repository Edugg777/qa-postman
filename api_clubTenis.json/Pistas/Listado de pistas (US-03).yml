info:
  name: Listado de pistas (US-03)
  type: http
  seq: 1
  tags:
    - Pistas

http:
  method: GET
  url: "{{baseUrl}}/pistas"
  params:
    - name: estado
      value: Disponible
      type: query
      disabled: true
    - name: estado
      value: Mantenimiento
      type: query
      disabled: true
    - name: estado
      value: FueraDeServicio
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Lista de pistas.
    request:
      url: "{{baseUrl}}/pistas"
      method: GET
      params:
        - name: estado
          value: Disponible
          type: query
          disabled: true
        - name: estado
          value: Mantenimiento
          type: query
          disabled: true
        - name: estado
          value: FueraDeServicio
          type: query
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 1,
              "nombre": "Pista Central",
              "superficie": "TierraBatida",
              "estado": "Disponible",
              "createdAt": "2026-04-06T09:00:00Z",
              "updatedAt": "2026-04-06T09:30:00Z"
            }
          ]
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/pistas"
      method: GET
      params:
        - name: estado
          value: Disponible
          type: query
          disabled: true
        - name: estado
          value: Mantenimiento
          type: query
          disabled: true
        - name: estado
          value: FueraDeServicio
          type: query
          disabled: true
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

