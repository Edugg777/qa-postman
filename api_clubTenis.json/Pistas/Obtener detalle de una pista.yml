info:
  name: Obtener detalle de una pista
  type: http
  seq: 2
  tags:
    - Pistas

http:
  method: GET
  url: "{{baseUrl}}/pistas/:id"
  params:
    - name: id
      value: "1"
      type: path
      description: Identificador de la pista.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Detalle de la pista.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: GET
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1,
            "nombre": "Pista Central",
            "superficie": "TierraBatida",
            "estado": "Disponible",
            "createdAt": "2026-04-06T09:00:00Z",
            "updatedAt": "2026-04-06T09:30:00Z"
          }
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: GET
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 404 Response
    description: Not Found - Pista no encontrada.
    request:
      url: "{{baseUrl}}/pistas/:id"
      method: GET
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador de la pista.
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
