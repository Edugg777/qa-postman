info:
  name: Cancelar reserva futura (US-10)
  type: http
  seq: 3
  tags:
    - Reservas

http:
  method: PATCH
  url: "{{baseUrl}}/reservas/:id/cancelar"
  params:
    - name: id
      value: "1"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Reserva cancelada correctamente.
    request:
      url: "{{baseUrl}}/reservas/:id/cancelar"
      method: PATCH
      params:
        - name: id
          value: "1"
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 1001,
            "idPista": 2,
            "nombrePista": "Pista Central",
            "fecha": "2026-04-10",
            "horaInicio": "18:00",
            "horaFin": "18:00",
            "duracionMinutos": 60,
            "estado": "Confirmada",
            "createdAt": "2026-04-06T12:30:00Z"
          }
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/reservas/:id/cancelar"
      method: PATCH
      params:
        - name: id
          value: "1"
          type: path
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 403 Response
    description: Forbidden - No puedes cancelar una reserva ajena.
    request:
      url: "{{baseUrl}}/reservas/:id/cancelar"
      method: PATCH
      params:
        - name: id
          value: "1"
          type: path
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 404 Response
    description: Not Found - Reserva no encontrada.
    request:
      url: "{{baseUrl}}/reservas/:id/cancelar"
      method: PATCH
      params:
        - name: id
          value: "1"
          type: path
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 409 Response
    description: Conflict - La reserva no puede cancelarse porque ya ha comenzado, ha finalizado o ya estaba cancelada.
    request:
      url: "{{baseUrl}}/reservas/:id/cancelar"
      method: PATCH
      params:
        - name: id
          value: "1"
          type: path
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

docs: |
  Marca una reserva futura como cancelada y libera la pista en el calendario. Solo puede cancelar la reserva su propietario o un Administrador.
