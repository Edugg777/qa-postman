info:
  name: Eliminar usuario / baja de socio (US-06)
  type: http
  seq: 3
  tags:
    - Usuarios

http:
  method: DELETE
  url: "{{baseUrl}}/usuarios/:id"
  params:
    - name: id
      value: "1"
      type: path
      description: Identificador del usuario.
  body:
    type: json
    data: |-
      {
        "password": "MiClaveSegura123",
        "confirmar": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: No Content - Usuario dado de baja correctamente.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "password": "MiClaveSegura123",
            "confirmar": true
          }
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request - Falta confirmación o la contraseña es inválida.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: DELETE
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
