info:
  name: Obtener mi perfil
  type: http
  seq: 1
  tags:
    - Usuarios

http:
  method: GET
  url: "{{baseUrl}}/usuarios/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Perfil del usuario autenticado.
    request:
      url: "{{baseUrl}}/usuarios/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 10,
            "nombre": "Juan Pérez",
            "email": "juan@tenis.com",
            "telefono": "+34600112233",
            "rol": "Socio",
            "activo": true,
            "createdAt": "2026-04-06T10:00:00Z",
            "updatedAt": "2026-04-06T10:15:00Z"
          }
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/usuarios/me"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

docs: Devuelve el perfil del usuario autenticado.
