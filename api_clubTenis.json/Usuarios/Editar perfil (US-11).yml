info:
  name: Editar perfil (US-11)
  type: http
  seq: 2
  tags:
    - Usuarios

http:
  method: PUT
  url: "{{baseUrl}}/usuarios/:id"
  params:
    - name: id
      value: "1"
      type: path
      description: Identificador del usuario.
  body:
    type: json
    data: |-
      {
        "email": "nuevoemail@tenis.com",
        "telefono": "+34655111222"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Perfil actualizado correctamente.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: PUT
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "email": "nuevoemail@tenis.com",
            "telefono": "+34655111222"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 10,
            "nombre": "Juan Pérez",
            "email": "juan@tenis.com",
            "telefono": "+34600112233",
            "rol": "Socio",
            "activo": true,
            "createdAt": "2026-04-06T10:00:00Z",
            "updatedAt": "2026-04-06T10:15:00Z"
          }
  - name: 400 Response
    description: Bad Request - Formato inválido de email o teléfono.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: PUT
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "email": "nuevoemail@tenis.com",
            "telefono": "+34655111222"
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 401 Response
    description: Unauthorized - Token ausente, expirado o inválido.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: PUT
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "email": "nuevoemail@tenis.com",
            "telefono": "+34655111222"
          }
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 403 Response
    description: Forbidden - No puedes editar el perfil de otro socio.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: PUT
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "email": "nuevoemail@tenis.com",
            "telefono": "+34655111222"
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 404 Response
    description: Not Found - Usuario no encontrado.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: PUT
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "email": "nuevoemail@tenis.com",
            "telefono": "+34655111222"
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }
  - name: 409 Response
    description: Conflict - El email ya está en uso por otro usuario.
    request:
      url: "{{baseUrl}}/usuarios/:id"
      method: PUT
      params:
        - name: id
          value: "1"
          type: path
          description: Identificador del usuario.
      body:
        type: json
        data: |-
          {
            "email": "nuevoemail@tenis.com",
            "telefono": "+34655111222"
          }
    response:
      status: 409
      statusText: Conflict
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "timestamp": "2026-04-06T12:00:00Z",
            "status": 409,
            "error": "Conflict",
            "code": "SLOT_NOT_AVAILABLE",
            "message": "La pista seleccionada ya está reservada en ese horario.",
            "path": "/api/v1/reservas",
            "details": [
              {
                "field": "email",
                "issue": "Debe tener formato de email válido."
              }
            ]
          }

docs: |
  Permite al socio autenticado actualizar su email y/o teléfono. El servidor debe validar que el recurso coincide con el usuario autenticado o que el actor tiene privilegios suficientes.
